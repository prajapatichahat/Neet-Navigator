<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | NEET Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css"><link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="Logo">
        <span class="logo-text">Ark_<span>Professor</span></span>
      </a>

      <h2>Welcome Back <i class="fa-solid fa-hand" style="color: var(--primary-orange);"></i></h2>
      <p class="auth-subtitle">Log in to access your dashboard, predictions, and saved colleges.</p>

      <!-- Social Login -->
      <button class="social-btn">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>

      <div class="auth-divider"><span>or sign in with email</span></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
          <a href="#" style="display: block; text-align: right; margin-top: var(--space-2); font-size: var(--text-sm); color: var(--primary-orange); font-weight: 500;">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: var(--space-4);">Log In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register Free</a>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
