<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | NEET Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css"><link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="Logo">
        <span class="logo-text">Ark <span>Professor</span></span>
      </a>

      <h2>Create Account <i class="fa-solid fa-wand-magic-sparkles" style="color: var(--primary-orange);"></i></h2>
      <p class="auth-subtitle">Join thousands of students using NEET Navigator for their medical admission journey.</p>

      <!-- Social Login -->
      <button class="social-btn">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign up with Google
      </button>

      <div class="auth-divider"><span>or register with email</span></div>

      <form id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="regFirstName">First Name</label>
            <input type="text" class="form-control" id="regFirstName" placeholder="First name" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="regLastName">Last Name</label>
            <input type="text" class="form-control" id="regLastName" placeholder="Last name" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="regEmail">Email Address</label>
          <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="regPhone">Phone Number</label>
          <input type="tel" class="form-control" id="regPhone" placeholder="+91 88499 88338" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword">Password</label>
          <input type="password" class="form-control" id="regPassword" placeholder="Create a strong password" required minlength="8">
          <span class="form-helper">Minimum 8 characters</span>
        </div>
        <div style="margin-bottom: var(--space-5);">
          <label class="checkbox-label">
            <input type="checkbox" required>
            I agree to the <a href="#" style="color: var(--primary-orange); font-weight: 600;">Terms of Service</a> and <a href="#" style="color: var(--primary-orange); font-weight: 600;">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log In</a>
      </div>

      <!-- OTP Verification (hidden by default — shown after registration) -->
      <div id="otpSection" style="display: none; margin-top: var(--space-8); padding-top: var(--space-6); border-top: 1px solid var(--gray-100);">
        <h3 style="text-align: center; margin-bottom: var(--space-2);">Verify Your Phone</h3>
        <p style="text-align: center; font-size: var(--text-sm); color: var(--gray-400); margin-bottom: var(--space-4);">Enter the 6-digit OTP sent to your phone</p>
        <div class="otp-inputs">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
        </div>
        <button class="btn btn-primary btn-lg" style="width: 100%;">Verify OTP</button>
        <p style="text-align: center; margin-top: var(--space-4); font-size: var(--text-sm); color: var(--gray-400);">
          Didn't receive? <a href="#" style="color: var(--primary-orange); font-weight: 600;">Resend OTP</a>
        </p>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
  <script>
    // OTP input auto-focus
    document.querySelectorAll('.otp-input').forEach((input, i, inputs) => {
      input.addEventListener('input', () => {
        if (input.value.length === 1 && i < inputs.length - 1) inputs[i + 1].focus();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && i > 0) inputs[i - 1].focus();
      });
    });
  </script>
</body>
</html>
