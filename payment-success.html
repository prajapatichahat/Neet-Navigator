<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful | NEET Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css"><link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>
  <div class="result-page">
    <div class="result-card">
      <div class="result-icon success"><i class="fa-solid fa-circle-check"></i></div>
      <h2>Payment <span class="highlight-orange">Successful!</span></h2>
      <p>Your payment has been processed successfully. You now have full access to your selected plan. A confirmation email has been sent to your registered email address.</p>
      <div style="background: var(--gray-50); border-radius: var(--radius-lg); padding: var(--space-5); margin-bottom: var(--space-6); text-align: left;">
        <div class="info-list">
          <div class="info-list-item"><span class="label">Plan</span><span class="value">Pro Plan</span></div>
          <div class="info-list-item"><span class="label">Amount</span><span class="value" style="color: var(--primary-orange);">₹999</span></div>
          <div class="info-list-item"><span class="label">Txn ID</span><span class="value">TXN2026041112345</span></div>
          <div class="info-list-item"><span class="label">Valid Till</span><span class="value">April 11, 2027</span></div>
        </div>
      </div>
      <div class="result-actions">
        <a href="index.html" class="btn btn-primary">Go to Dashboard</a>
        <a href="predictor.html" class="btn btn-secondary">Try Predictor</a>
      </div>
    </div>
  </div>
</body>
</html>
